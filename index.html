function Forecast({items,logs}){
  const [ag,setAg]=useState("전체");
  const [modal,setModal]=useState(null);
  const forecasts=useMemo(function(){
    return items.map(function(item){
      const iL=logs.filter(function(l){return l.itemId===item.id&&l.type==="출고";});
      if(!iL.length)return Object.assign({},item,{avgOut:0,forecast:0,daysLeft:999,risk:"안전",riskCol:GRN});
      const total=iL.reduce(function(s,l){return s+l.qty;},0);
      const avgOut=Math.round(total/Math.max(1,Math.round(iL.length*2.5))*30);
      const forecast=Math.round(avgOut*1.1);
      const daysLeft=avgOut>0?Math.round((item.stock/avgOut)*30):999;
      var risk="안전",riskCol=GRN;
      if(daysLeft<7){risk="위험";riskCol=RED;}
      else if(daysLeft<14){risk="주의";riskCol=YLW;}
      else if(daysLeft<30){risk="보통";riskCol=SKY;}
      return Object.assign({},item,{avgOut,forecast,daysLeft,risk,riskCol});
    }).sort(function(a,b){return a.daysLeft-b.daysLeft;});
  },[items,logs]);
  const filtered=ag==="전체"?forecasts:forecasts.filter(function(f){return f.group===ag;});
  const risky=filtered.filter(function(f){return f.risk==="위험"||f.risk==="주의";});
  const safe=filtered.filter(function(f){return f.risk==="안전"||f.risk==="보통";});
  function FBar({f}){
    return(
      <Card style={{padding:"14px 15px",marginBottom:8,borderColor:f.risk==="위험"?"rgba(244,63,94,0.3)":f.risk==="주의"?"rgba(245,158,11,0.3)":BRD}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div>
            <div style={{fontWeight:800,fontSize:14,color:TXTH,marginBottom:3}}>{f.name}</div>
            <span style={{fontSize:11,color:GCOL[f.group],background:GCOL[f.group]+"15",borderRadius:4,padding:"1px 7px"}}>{GICO[f.group]} {f.group}</span>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{background:f.riskCol+"18",color:f.riskCol,borderRadius:7,padding:"4px 13px",fontSize:13,fontWeight:800,border:"1px solid "+f.riskCol+"40",marginBottom:3}}>{f.risk}</div>
            <div style={{fontSize:12,color:MUT}}>잔여 <span style={{color:f.riskCol,fontWeight:700}}>{f.daysLeft>=999?"999+":f.daysLeft+"일"}</span></div>
          </div>
        </div>
        <div style={{display:"flex",gap:12,fontSize:12,color:MUT,marginBottom:8,flexWrap:"wrap"}}>
          <span>현재고: <span style={{color:TXTH,fontWeight:700}}>{comma(f.stock)}{f.unit}</span></span>
          <span>월평균: <span style={{color:RED,fontWeight:700}}>{comma(f.avgOut)}{f.unit}</span></span>
          <span>다음달: <span style={{color:YLW,fontWeight:700}}>{comma(f.forecast)}{f.unit}</span></span>
        </div>
        <div style={{background:BRD2,borderRadius:99,height:5}}>
          <div style={{width:Math.min(100,f.daysLeft>=999?100:f.daysLeft/60*100)+"%",height:"100%",background:f.riskCol,borderRadius:99}}/>
        </div>
      </Card>
    );
  }
  const modalList=modal?forecasts.filter(function(f){return f.risk===modal;}):[];
  return(
    <div>
      <SectionTitle icon="[예측]" title="수요예측 대시보드" sub="출고 이력 기반 재고 소진 예측"/>
      <GroupTabs active={ag} onChange={setAg}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {[{label:"위험",val:forecasts.filter(function(f){return f.risk==="위험";}).length+"종",color:RED,icon:"[위험]"},
          {label:"주의",val:forecasts.filter(function(f){return f.risk==="주의";}).length+"종",color:YLW,icon:"[주의]"},
          {label:"보통",val:forecasts.filter(function(f){return f.risk==="보통";}).length+"종",color:SKY,icon:"[보통]"},
          {label:"안전",val:forecasts.filter(function(f){return f.risk==="안전";}).length+"종",color:GRN,icon:"[안전]"}
        ].map(function(k){
          return(
            <Card key={k.label}
              onClick={function(){setModal(k.label);}}
              style={{padding:"15px 16px",position:"relative",cursor:"pointer",border:"1px solid "+k.color+"35"}}
              onMouseOver={function(e){e.currentTarget.style.transform="translateY(-2px)";}}
              onMouseOut={function(e){e.currentTarget.style.transform="translateY(0)";}}
            >
              <div style={{position:"absolute",top:10,right:12,fontSize:11,color:k.color,fontWeight:700,opacity:0.7}}>&gt;</div>
              <div style={{fontSize:13,color:MUT,marginBottom:5,fontWeight:700}}>{k.icon}</div>
              <div style={{fontSize:22,fontWeight:900,color:k.color}}>{k.val}</div>
              <div style={{fontSize:13,color:MUT,marginTop:4}}>{k.label}</div>
            </Card>
          );
        })}
      </div>
      {risky.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,color:RED,marginBottom:10}}>{"[경고] 즉시 발주 검토 ("+risky.length+"종)"}</div>
          {risky.map(function(f){return <FBar key={f.id} f={f}/>;}) }
        </div>
      )}
      <div>
        <div style={{fontWeight:700,fontSize:14,color:MUT,marginBottom:10}}>{"[완료] 안정 품목 ("+safe.length+"종)"}</div>
        {safe.slice(0,10).map(function(f){return <FBar key={f.id} f={f}/>;}) }
        {safe.length>10&&<div style={{textAlign:"center",color:MUT,fontSize:13,marginTop:8}}>{"외 "+(safe.length-10)+"종 안전"}</div>}
      </div>

      {modal&&(
        <div onClick={function(){setModal(null);}}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:500,
            display:"flex",alignItems:"flex-end",backdropFilter:"blur(4px)"}}>
          <div onClick={function(e){e.stopPropagation();}}
            style={{background:CARD,borderRadius:"22px 22px 0 0",border:"1px solid "+BRD,
              width:"100%",maxWidth:640,margin:"0 auto",maxHeight:"80vh",overflowY:"auto",paddingBottom:32}}>
            <div style={{display:"flex",justifyContent:"center",paddingTop:12,marginBottom:4}}>
              <div style={{width:36,height:4,background:BRD,borderRadius:99}}/>
            </div>
            <div style={{position:"sticky",top:0,background:CARD,padding:"12px 20px 14px",
              borderBottom:"1px solid "+BRD2,display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:1}}>
              <div style={{fontWeight:800,fontSize:18,color:WHT}}>{"["+modal+"] "+modal+" ("+modalList.length+"종)"}</div>
              <button onClick={function(){setModal(null);}}
                style={{background:SURF,border:"1px solid "+BRD,borderRadius:10,color:MUT,
                  padding:"6px 14px",cursor:"pointer",fontSize:15,fontWeight:700}}>닫기</button>
            </div>
            <div style={{padding:"16px"}}>
              {modalList.length===0?(
                <div style={{textAlign:"center",padding:"40px",color:MUT,fontSize:15}}>해당 품목이 없습니다</div>
              ):(
                modalList.map(function(f){return <FBar key={f.id} f={f}/>;})
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ItemManager({items,setItems,showToast}){
  const empty={name:"",group:"원료",stock:"",unit:"kg",loc:""};
  const [form,setForm]=useState(empty);
  const [ag,setAg]=useState("전체");
  const [search,setSearch]=useState("");
  const [delId,setDelId]=useState(null);
  function addItem(){
    if(!form.name){showToast("품목명을 입력하세요",RED);return;}
    const stock=form.stock?parseInt(form.stock):0;
    const pre=form.group==="원료"?"M":form.group==="비에스"?"P":"B";
    const ex=items.filter(function(i){return i.id.startsWith(pre);});
    const n=ex.length>0?Math.max.apply(null,ex.map(function(i){return parseInt(i.id.slice(1));}))+1:1;
    const newItem=Object.assign({},form,{id:pre+String(n).padStart(3,"0"),stock:stock});
    setItems(function(p){return p.concat([newItem]);});
    showToast("[완료] 품목 추가 완료 - "+form.name);setForm(empty);
    apiPost("addItem",{data:itemToRow(newItem)}).catch(function(){showToast("[주의] 서버 저장 실패",YLW);});
  }
  function delItem(id){
    setItems(function(p){return p.filter(function(i){return i.id!==id;});});
    showToast("[삭제] 품목 삭제 완료",YLW);setDelId(null);
    apiPost("deleteItem",{id:id}).catch(function(){});
  }
  const list=items.filter(function(i){return (ag==="전체"||i.group===ag)&&(!search||i.name.includes(search)||i.id.includes(search));});
  return(
    <div>
      <SectionTitle icon="[설정]" title="품목 관리" sub="관리자 전용"/>
      <Card style={{padding:18,marginBottom:16}}>

        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {GROUPS.map(function(g){
            const on=form.group===g;
            return(
              <button key={g} onClick={function(){setForm(function(p){return Object.assign({},p,{group:g});});}}
                style={{flex:1,padding:"10px 4px",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:12,
                  border:"2px solid "+(on?GCOL[g]:BRD),background:on?GCOL[g]+"15":"transparent",
                  color:on?GCOL[g]:MUT,lineHeight:1.4}}>
                {GICO[g]}<br/>{g}
              </button>
            );
          })}
        </div>
        <div style={{marginBottom:11}}>
          <div style={{fontSize:13,color:MUT,marginBottom:7,fontWeight:700}}>품목명 *</div>
          <input type="text" placeholder="품목명 입력" value={form.name}
            onChange={function(e){setForm(function(p){return Object.assign({},p,{name:e.target.value});});}}
            style={{width:"100%",background:SURF,border:"1px solid "+BRD,borderRadius:8,color:TXTH,padding:"11px 12px",fontSize:14}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:10,marginBottom:14}}>
          <div>
            <div style={{fontSize:13,color:MUT,marginBottom:7,fontWeight:700}}>초기 재고</div>
            <input type="number" placeholder="수량" value={form.stock}
              onChange={function(e){setForm(function(p){return Object.assign({},p,{stock:e.target.value});});}}
              style={{width:"100%",background:SURF,border:"1px solid "+BRD,borderRadius:8,color:TXTH,padding:"11px 12px",fontSize:14}}/>
          </div>
          <div>
            <div style={{fontSize:13,color:MUT,marginBottom:7,fontWeight:700}}>단위</div>
            <select value={form.unit} onChange={function(e){setForm(function(p){return Object.assign({},p,{unit:e.target.value});});}}
              style={{width:"100%",background:SURF,border:"1px solid "+BRD,borderRadius:8,color:TXTH,padding:"11px 8px",fontSize:13}}>
              <option value="kg">kg</option><option value="개">개</option><option value="L">L</option>
            </select>
          </div>
          <div>
            <div style={{fontSize:13,color:MUT,marginBottom:7,fontWeight:700}}>위치</div>
            <input type="text" placeholder="A-01" value={form.loc}
              onChange={function(e){setForm(function(p){return Object.assign({},p,{loc:e.target.value});});}}
              style={{width:"100%",background:SURF,border:"1px solid "+BRD,borderRadius:8,color:TXTH,padding:"11px 8px",fontSize:13}}/>
          </div>
        </div>
        <button onClick={addItem} style={{width:"100%",background:"linear-gradient(135deg,#1D6FE8,#38BDF8)",

      <GroupTabs active={ag} onChange={setAg}/>

        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="품목 검색"
          style={{background:SURF,border:"1px solid "+BRD,borderRadius:8,color:TXT,padding:"8px 12px",fontSize:14,width:"100%",maxWidth:240}}/>
      </div>
      <div style={{display:"grid",gap:8}}>
        {list.length===0?<Card style={{padding:"28px",textAlign:"center",color:MUT,fontSize:15}}>품목이 없습니다</Card>
        :list.map(function(item){
          return(
            <Card key={item.id} style={{padding:"12px 15px"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1,minWidth:0}}>

                    <span>{item.id}</span>
                    <span>{""+item.loc}</span>
                    <span style={{color:item.stock===0?RED:TXT,fontWeight:item.stock===0?700:400}}>{comma(item.stock)}{item.unit}</span>
                  </div>
                </div>
                {delId===item.id?(
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <button onClick={function(){delItem(item.id);}}
                      style={{background:"rgba(244,63,94,0.15)",border:"1px solid rgba(244,63,94,0.4)",
                        borderRadius:8,color:RED,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:700}}>확인</button>
                    <button onClick={function(){setDelId(null);}}
                      style={{background:"transparent",border:"1px solid "+BRD,borderRadius:8,color:MUT,padding:"6px 10px",cursor:"pointer",fontSize:13}}>취소</button>
                  </div>
                ):(
                  <button onClick={function(){setDelId(item.id);}}
                    style={{background:"transparent",border:"1px solid rgba(244,63,94,0.3)",borderRadius:8,
                      color:RED,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:600,flexShrink:0}}>삭제</button>
                )}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

  const ref=useRef(null);
  useEffect(function(){if(ref.current)ref.current.scrollIntoView({behavior:"smooth"});},[msgs]);
  const QUICK=["재고없는 품목 알려줘","바이오보관품 현황","비에스 제품 요약","원료 재고 분석","발주 필요 품목","출고 많은 품목은?"];
  function send(q){
    const question=q||input.trim();
    if(!question||loading)return;
    setInput("");
    setMsgs(function(p){return p.concat([{role:"user",text:question}]);});
    setLoading(true);
    callAI(question,items,logs).then(function(ans){
      setMsgs(function(p){return p.concat([{role:"ai",text:ans}]);});
      setLoading(false);
    }).catch(function(){
      setMsgs(function(p){return p.concat([{role:"ai",text:"[오류] 오류가 발생했습니다."}]);});
      setLoading(false);
    });
  }
  return(
    <div>
      <SectionTitle icon="[AI]" title="AI 재고 상담" sub="실시간 데이터 기반 분석"/>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
        {QUICK.map(function(q){
          return(
            <button key={q} onClick={function(){send(q);}} disabled={loading}
              style={{background:CARD,border:"1px solid "+BRD,borderRadius:8,color:MUT,
                padding:"7px 13px",cursor:"pointer",fontSize:13,opacity:loading?0.5:1}}>
              {q}
            </button>
          );
        })}
      </div>
      <Card style={{height:380,overflowY:"auto",padding:15,marginBottom:12,display:"flex",flexDirection:"column",gap:11}}>
        {msgs.map(function(m,i){
          return(
            <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:9}}>
              {m.role==="ai"&&(
                <div style={{minWidth:32,height:32,padding:"0 6px",borderRadius:9,
                  background:"linear-gradient(135deg,#1D6FE8,#38BDF8)",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:10,fontWeight:800,whiteSpace:"nowrap",flexShrink:0,alignSelf:"flex-start",marginTop:2}}>[AI]</div>
              )}
              <div style={{maxWidth:"80%",
                background:m.role==="user"?"linear-gradient(135deg,#1D6FE8,#38BDF8)":SURF,
                border:m.role==="ai"?"1px solid "+BRD:"none",
                borderRadius:m.role==="user"?"14px 14px 3px 14px":"14px 14px 14px 3px",
                padding:"12px 14px",fontSize:14,lineHeight:1.7,whiteSpace:"pre-wrap",color:TXTH}}>
                {m.text}
              </div>
            </div>
          );
        })}
        {loading&&(
          <div style={{display:"flex",gap:9}}>
            <div style={{minWidth:32,height:32,padding:"0 6px",borderRadius:9,background:"linear-gradient(135deg,#1D6FE8,#38BDF8)",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,whiteSpace:"nowrap"}}>[AI]</div>
            <div style={{background:SURF,border:"1px solid "+BRD,borderRadius:"14px 14px 14px 3px",
              padding:"12px 14px",fontSize:14,color:MUT}}>분석 중...</div>
          </div>
        )}
        <div ref={ref}/>
      </Card>
      <div style={{display:"flex",gap:10}}>
        <input value={input} onChange={function(e){setInput(e.target.value);}}
          onKeyDown={function(e){if(e.key==="Enter"&&!loading)send();}}
          placeholder="질문 입력..." disabled={loading}
          style={{flex:1,background:SURF,border:"1px solid "+BRD,borderRadius:10,
            color:TXTH,padding:"13px 15px",fontSize:14}}/>
        <button onClick={function(){send();}} disabled={loading}
          style={{background:"linear-gradient(135deg,#1D6FE8,#38BDF8)",border:"none",
            borderRadius:10,color:"#fff",padding:"13px 20px",fontWeight:800,cursor:"pointer",
            fontSize:14,opacity:loading?0.6:1}}>전송</button>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
