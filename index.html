const API_URL = "https://script.google.com/macros/s/AKfycby3Tyqh0xOUV2fZseKagBPoGCEDFXO05ONy8bwDGux1UpwTb7uWnyVT6ktDJJLQphDi/exec";

function apiGet(action, params){
  var qs = "action="+action;
  if(params){
    Object.keys(params).forEach(function(k){
      qs += "&"+k+"="+encodeURIComponent(params[k]);
    });
  }
  return fetch(API_URL+"?"+qs).then(function(r){return r.json();});
}

function apiPost(action, data){
  return fetch(API_URL, {
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(Object.assign({action:action}, data))
  }).then(function(r){return r.json();});
}

/* 시트(한글 컬럼) -> 앱 내부 객체(영문 필드) 변환 */
function rowToItem(r){
  return{
    id:r["품목ID"], name:r["품목명"], group:r["구분"],
    stock:Number(r["재고량"])||0, unit:r["단위"], loc:r["위치"]
  };
}
function itemToRow(it){
  return{
    "품목ID":it.id, "품목명":it.name, "구분":it.group,
    "재고량":it.stock, "단위":it.unit, "위치":it.loc
  };
}
function normDate(v){
  if(v==null||v==="")return "";
  if(v instanceof Date)return v.toISOString().slice(0,10);
  var s=String(v);
  // "Tue Jun 20 2026 00:00:00 GMT+0900" 같은 형태도 안전하게 파싱
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
  var d=new Date(s);
  if(!isNaN(d.getTime()))return d.toISOString().slice(0,10);
  return s;
}
function normTime(v){
  if(v==null||v==="")return "";
  if(v instanceof Date){
    var hh=String(v.getHours()).padStart(2,"0");
    var mm=String(v.getMinutes()).padStart(2,"0");
    return hh+":"+mm;
  }
  var s=String(v);
  // 이미 "HH:MM" 형식인 경우
  if(/^\d{1,2}:\d{2}/.test(s))return s.slice(0,5);
  // ISO 날짜시간 문자열(예: "1899-12-30T09:00:00.000Z") - 시:분만 추출
  var iso=s.match(/T(\d{2}):(\d{2})/);
  if(iso)return iso[1]+":"+iso[2];
  // 마지막 시도: Date로 파싱
  var d=new Date(s);
  if(!isNaN(d.getTime())){
    var hh2=String(d.getHours()).padStart(2,"0");
    var mm2=String(d.getMinutes()).padStart(2,"0");
    return hh2+":"+mm2;
  }
  return s.slice(0,5);
}
function rowToLog(r){
  return{
    id:r["ID"], date:normDate(r["날짜"]), time:normTime(r["시간"]),
    itemId:r["품목ID"], itemName:r["품목명"], group:r["구분"],
    type:r["입출고"], qty:Number(r["수량"])||0, unit:r["단위"],
    partner:r["거래처"]||"", memo:r["메모"]||"", by:r["담당자"]
  };
}
function logToRow(l){
  return{
    "ID":l.id, "날짜":l.date, "시간":l.time,
    "품목ID":l.itemId, "품목명":l.itemName, "구분":l.group,
    "입출고":l.type, "수량":l.qty, "단위":l.unit,
    "거래처":l.partner||"", "메모":l.memo||"", "담당자":l.by
  };
}
function rowToFormula(f){
  return{
    id:f.id, productName:f.productName, productId:f.productId,
    outputUnit:f.outputUnit, desc:f.desc,
    ingredients:(f.ingredients||[]).map(function(ing){
      return{itemId:ing.itemId, name:ing.name, kgPer250:Number(ing.kgPer250)||0};
    })
  };
}
function formulaToRows(f){
  return f.ingredients.map(function(ing){
    return{
      "지시서ID":f.id, "제품명":f.productName, "완제품ID":f.productId,
      "출력단위":f.outputUnit, "설명":f.desc||"",
      "원료ID":ing.itemId, "원료명":ing.name, "배합량(kg/250kg)":ing.kgPer250
    };
  });
}
function rowToProdLog(r){
  return{
    id:r["ID"], date:normDate(r["날짜"]), time:normTime(r["시간"]),
    formulaId:r["지시서ID"], formulaName:r["지시서명"],
    productId:r["완제품ID"], outputKg:Number(r["생산량"])||0,
    batches:Number(r["배치수"])||0,
    ingredients:(function(){try{return JSON.parse(r["사용원료(JSON)"]||"[]");}catch(e){return [];}})(),
    memo:r["메모"]||"", by:r["담당자"]
  };
}
function prodLogToRow(p){
  return{
    "ID":p.id, "날짜":p.date, "시간":p.time,
    "지시서ID":p.formulaId, "지시서명":p.formulaName,
    "완제품ID":p.productId, "생산량":p.outputKg, "배치수":p.batches,
    "사용원료(JSON)":JSON.stringify(p.ingredients||[]),
    "메모":p.memo||"", "담당자":p.by
  };
}
function visitToRow(v){
  return{
    "ID":v.id, "사용자명":v.userName, "역할":v.role,
    "날짜":v.date, "시간":v.time
  };
}

function LoginScreen({onLogin,userList}){
  const [sel,setSel]=useState(null);
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  function tryLogin(){
    if(!sel){setErr("사용자를 선택하세요");return;}
    if(!pw){setErr("비밀번호를 입력하세요");return;}
    setBusy(true);setErr("");
    apiGet("login",{userId:sel,pw:pw}).then(function(res){
      setBusy(false);
      if(res.ok){onLogin(res.user);}
      else{setErr(res.message||"비밀번호가 올바르지 않습니다");setPw("");}
    }).catch(function(){
      setBusy(false);setErr("서버 연결에 실패했습니다");
    });
  }
  return(
    <div style={{minHeight:"100vh",
      background:"radial-gradient(ellipse 70% 50% at 50% 0%,rgba(212,175,106,0.1),transparent),"+BG,
      display:"flex",alignItems:"center",
      justifyContent:"center",flexDirection:"column",padding:"16px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:30,fontWeight:900,color:WHT,letterSpacing:"-0.5px",marginBottom:6}}>세인비에스</div>
        <div style={{fontSize:12,color:ACC,fontWeight:700,letterSpacing:"0.1em",marginBottom:14}}>SEIN B&S CO., LTD</div>
        <div style={{fontSize:12,color:MUT,background:CARD,border:"1px solid "+BRD,
          borderRadius:8,padding:"6px 16px",display:"inline-block"}}>
          창고관리 시스템 WMS v8.0
        </div>
      </div>
      <div style={{background:CARD,border:"1px solid rgba(212,175,106,0.25)",borderRadius:16,
        boxShadow:"0 20px 50px rgba(0,0,0,0.45),0 1px 0 rgba(212,175,106,0.15) inset",
        padding:"32px 28px",width:"100%",maxWidth:360}}>
        <div style={{fontSize:18,fontWeight:800,color:WHT,marginBottom:20,textAlign:"center"}}>로그인</div>
        <div style={{marginBottom:18}}>
          <div style={{fontSize:12,color:MUT,marginBottom:10,fontWeight:700}}>사용자 선택</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {(userList&&userList.length?userList:USERS).map(function(u){
              const on=sel===u.id;
              return(
                <button key={u.id} onClick={function(){setSel(u.id);setErr("");setPw("");}}
                  style={{padding:"6px 12px",borderRadius:12,cursor:"pointer",
                    background:on?(u.role==="viewer"?"rgba(58,124,165,0.15)":"rgba(138,106,53,0.12)"):"transparent",
                    border:"2px solid "+(on?(u.role==="viewer"?SKY:ACC):BRD),
                    color:on?(u.role==="viewer"?SKY:ACCL):(u.role==="viewer"?SKY:MUT),
                    fontSize:14,fontWeight:700,transition:"all 0.15s",
                    display:"flex",alignItems:"center",justifyContent:"center",minHeight:46}}>
                  <div>{u.role==="viewer"?"조회전용":u.name}</div>
                </button>
              );
            })}
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:MUT,marginBottom:8,fontWeight:700}}>비밀번호</div>
          <input type="password"value={pw}
            onChange={function(e){setPw(e.target.value);setErr("");}}
            onKeyDown={function(e){if(e.key==="Enter")tryLogin();}}
            placeholder="비밀번호 입력"
            style={{width:"100%",background:SURF,border:"1px solid "+(err?RED:BRD),
              borderRadius:8,color:TXTH,padding:"10px 14px",fontSize:16,outline:"none"}}/>
        </div>
        {err&&<div style={{color:RED,fontSize:12,marginBottom:12,textAlign:"center",fontWeight:600}}>{err}</div>}
        <button onClick={tryLogin} disabled={busy} style={{width:"100%",padding:"14px",borderRadius:12,
          border:"none",cursor:busy?"not-allowed":"pointer",
          background:"linear-gradient(135deg,#8A6A35,#A3804A)",opacity:busy?0.7:1,
          color:"#fff",fontWeight:800,fontSize:16}}>
          {busy?"확인 중...":"로그인"}
        </button>
      </div>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("dashboard");
  const [items,setItems]=useState([]);
  const [logs,setLogs]=useState([]);
  const [fmls,setFmls]=useState([]);
  const [pLogs,setPLogs]=useState([]);
  const [toast,setToast]=useState(null);
  const [clock,setClock]=useState(new Date());
  const [visits,setVisits]=useState([]);
  const [users,setUsers]=useState([]);
  const [invFilter,setInvFilter]=useState("전체");
  const [loading,setLoading]=useState(true);
  const [loadErr,setLoadErr]=useState(null);
  const [showVisits,setShowVisits]=useState(false);
  const [lastSync,setLastSync]=useState(null);

  useEffect(function(){
    var styleEl=document.createElement("style");
    styleEl.innerHTML=
      "input[type='date']{color:#F1F3F6 !important;-webkit-text-fill-color:#F1F3F6 !important;background-color:transparent !important;}"+
      "input[type='date']::-webkit-datetime-edit{color:#F1F3F6 !important;-webkit-text-fill-color:#F1F3F6 !important;}"+
      "input[type='date']::-webkit-datetime-edit-fields-wrapper{color:#F1F3F6 !important;-webkit-text-fill-color:#F1F3F6 !important;}"+
      "input[type='date']::-webkit-datetime-edit-text{color:#F1F3F6 !important;-webkit-text-fill-color:#F1F3F6 !important;}"+
      "input[type='date']::-webkit-datetime-edit-month-field{color:#F1F3F6 !important;-webkit-text-fill-color:#F1F3F6 !important;}"+
      "input[type='date']::-webkit-datetime-edit-day-field{color:#F1F3F6 !important;-webkit-text-fill-color:#F1F3F6 !important;}"+
      "input[type='date']::-webkit-datetime-edit-year-field{color:#F1F3F6 !important;-webkit-text-fill-color:#F1F3F6 !important;}"+
      "input[type='date']::-webkit-calendar-picker-indicator{filter:invert(1) brightness(1.8);cursor:pointer;opacity:1 !important;}"+
      "select{color:#F1F3F6 !important;-webkit-text-fill-color:#F1F3F6 !important;background-color:#1D2330 !important;}"+
      "select option{background:#1D2330;color:#F1F3F6;}";
    document.head.appendChild(styleEl);
    return function(){document.head.removeChild(styleEl);};
  },[]);

  useEffect(function(){
    var t=setInterval(function(){setClock(new Date());},1000);
    return function(){clearInterval(t);};
  },[]);

  function loadAll(){
    setLoading(true);setLoadErr(null);
    apiGet("getAll").then(function(d){
      if(d.error){setLoadErr(d.error);setLoading(false);return;}
      setItems((d.items||[]).map(rowToItem));
      setLogs((d.logs||[]).map(rowToLog).sort(function(a,b){return b.date.localeCompare(a.date)||b.time.localeCompare(a.time);}));
      setFmls((d.formulas||[]).map(rowToFormula));
      setPLogs((d.prodlogs||[]).map(rowToProdLog).sort(function(a,b){return b.date.localeCompare(a.date)||b.time.localeCompare(a.time);}));
      setVisits((d.visits||[]).map(function(r){return{id:r["ID"],userName:r["사용자명"],role:r["역할"],date:normDate(r["날짜"]),time:normTime(r["시간"])};}).reverse());
      setUsers((d.users||[]).map(function(r){return{id:r["ID"],name:r["이름"],role:r["역할"]};}));
      setLoading(false);
      setLastSync(new Date());
    }).catch(function(err){
      setLoadErr(String(err));setLoading(false);
    });
  }

  // 화면을 가리지 않고 조용히 최신 데이터로 동기화 (다른 직원의 입출고 반영)
  function syncInBackground(){
    apiGet("getAll").then(function(d){
      if(d.error)return;
      setItems((d.items||[]).map(rowToItem));
      setLogs((d.logs||[]).map(rowToLog).sort(function(a,b){return b.date.localeCompare(a.date)||b.time.localeCompare(a.time);}));
      setFmls((d.formulas||[]).map(rowToFormula));
      setPLogs((d.prodlogs||[]).map(rowToProdLog).sort(function(a,b){return b.date.localeCompare(a.date)||b.time.localeCompare(a.time);}));
      setLastSync(new Date());
    }).catch(function(){});
  }

  useEffect(function(){ loadAll(); },[]);

  // 60초마다 자동으로 최신 데이터 동기화 (여러 직원이 동시에 쓸 때 정합성 보강)
  useEffect(function(){
    if(loading||!user)return;
    var t=setInterval(syncInBackground,60000);
    return function(){clearInterval(t);};
  },[loading,user]);

  // 입출고/생산 탭으로 이동할 때마다 즉시 한 번 더 최신화 (재고 충돌 최소화)
  useEffect(function(){
    if(loading||!user)return;
    if(tab==="inout"||tab==="produce")syncInBackground();
  },[tab]);

  function showToast(msg,color){setToast({msg:msg,color:color||GRN});setTimeout(function(){setToast(null);},3000);}

  function goToInventory(group){setInvFilter(group||"전체");setTab("inventory");}

  function handleLogin(u){
    var now=new Date();
    var visit={id:Date.now(),userName:u.name,role:u.role,
      date:now.toISOString().slice(0,10),time:now.toTimeString().slice(0,5)};
    setVisits(function(p){return [visit].concat(p);});
    apiPost("addVisit",{data:visitToRow(visit)}).catch(function(){});
    setUser(u);setTab("dashboard");
  }

  if(loading){
    return(
      <div style={{minHeight:"100vh",background:BG,display:"flex",alignItems:"center",
        justifyContent:"center",flexDirection:"column",gap:14}}>
        <div style={{fontSize:24,fontWeight:900,color:WHT,letterSpacing:"-0.3px"}}>세인비에스</div>
        <div style={{color:"#CBD5E1",fontSize:14}}>데이터 불러오는 중...</div>
      </div>
    );
  }

  if(loadErr){
    return(
      <div style={{minHeight:"100vh",background:BG,display:"flex",alignItems:"center",
        justifyContent:"center",flexDirection:"column",gap:14,padding:20,textAlign:"center"}}>
        <div style={{color:RED,fontWeight:800,fontSize:16}}>데이터 불러오기 실패</div>
        <div style={{color:"#4A6080",fontSize:12}}>{loadErr}</div>
        <button onClick={loadAll} style={{background:ACC,border:"none",borderRadius:8,
          color:"#fff",padding:"10px 20px",cursor:"pointer",fontWeight:700}}>다시 시도</button>
      </div>
    );
  }

  if(!user)return <LoginScreen onLogin={handleLogin} userList={users}/>;
  const isAdmin=user.role==="admin";
  const todayVisits=visits.filter(function(v){return v.date===today();});
  const TABS=[
    {key:"dashboard",label:"대시보드"},
    {key:"produce",label:"생산",adm:true},
    {key:"inout",label:"입출고",adm:true},
    {key:"inventory",label:"재고현황"},
    {key:"monthly",label:"월별분석"},
    {key:"forecast",label:"수요예측"},
    {key:"items",label:"품목관리",adm:true},
  ].filter(function(t){return !t.adm||isAdmin;});

  return(
    <div style={{minHeight:"100vh",
      background:"radial-gradient(ellipse 80% 50% at 50% -10%,rgba(212,175,106,0.08),transparent),"+BG,
      color:TXT,fontFamily:"'Nanum Gothic',-apple-system,system-ui,sans-serif",letterSpacing:"-0.01em",overflowX:"hidden"}}>
      <header style={{background:SURF,borderBottom:"1px solid "+BRD,
        boxShadow:"0 1px 0 rgba(212,175,106,0.25)",
        padding:SP.md+"px "+SP.lg+"px",display:"flex",alignItems:"center",
        justifyContent:"space-between",position:"sticky",top:0,zIndex:200,gap:SP.md}}>
        <div style={{display:"flex",alignItems:"baseline",gap:SP.sm,flexShrink:0,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:FS.xl,color:TXTH,whiteSpace:"nowrap",letterSpacing:"-0.2px"}}>세인비에스</div>
          <div style={{fontSize:FS.xs,color:ACC,fontWeight:700,letterSpacing:"0.06em"}}>WMS</div>
        </div>
        <div style={{textAlign:"right",flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end"}}>
          <div style={{fontSize:FS.md,color:MUT,fontWeight:700,whiteSpace:"nowrap"}}>{clock.toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"})}</div>
          <div style={{fontSize:FS.lg,fontWeight:700,color:TXTH,marginTop:2,whiteSpace:"nowrap",fontVariantNumeric:"tabular-nums",letterSpacing:"0.5px"}}>{clock.toTimeString().slice(0,8)}</div>
          {lastSync&&(
            <button onClick={syncInBackground} title="최신 데이터 동기화"
              style={{display:"flex",alignItems:"center",gap:4,marginTop:3,background:"transparent",
                border:"none",cursor:"pointer",padding:0,color:MUT,fontSize:10}}>
              <span style={{width:6,height:6,borderRadius:99,background:GRN,flexShrink:0}}/>
              동기화 {lastSync.toTimeString().slice(0,5)}
            </button>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:SP.sm,flexShrink:0}}>
          {isAdmin&&(
            <button onClick={function(){setShowVisits(true);}}
              style={{display:"flex",alignItems:"center",gap:5,
                background:"transparent",border:"1px solid "+BRD,
                borderRadius:RAD.sm,padding:"6px 12px",cursor:"pointer"}}>
              <span style={{fontSize:FS.base,fontWeight:700,color:MUT,fontVariantNumeric:"tabular-nums"}}>{todayVisits.length}</span>
            </button>
          )}
          <div style={{display:"flex",alignItems:"center",gap:8,
            padding:"6px 14px 6px 6px",background:CARD,
            border:"1px solid "+(isAdmin?"rgba(212,175,106,0.4)":BRD),borderRadius:RAD.sm}}>
            <div style={{width:28,height:28,borderRadius:RAD.sm,flexShrink:0,
              background:isAdmin?"rgba(212,175,106,0.18)":"rgba(255,255,255,0.06)",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:13,fontWeight:800,color:isAdmin?ACC:MUT}}>{user.name.charAt(0)}</div>
            <div style={{textAlign:"left"}}>
              <div style={{fontSize:FS.base,fontWeight:700,color:isAdmin?ACCL:TXT,lineHeight:1.2}}>{user.name}</div>
              <div style={{fontSize:11,color:MUT,letterSpacing:"0.02em",lineHeight:1.2}}>{isAdmin?"관리자":"조회전용"}</div>
            </div>
          </div>
          <button onClick={function(){setUser(null);}}
            style={{background:"transparent",border:"1px solid "+BRD,borderRadius:RAD.sm,
              color:MUT,cursor:"pointer",fontSize:FS.sm,fontWeight:600,padding:"7px 14px",
              transition:"all 0.15s"}}>로그아웃</button>
        </div>
      </header>

      <div style={{background:SURF,borderBottom:"1px solid "+BRD,overflowX:"auto",display:"flex"}}>
        {TABS.map(function(t){
          const on=tab===t.key;
          return(
            <button key={t.key} onClick={function(){setTab(t.key);}}
              style={{background:on?"rgba(212,175,106,0.08)":"transparent",
                border:"none",borderBottom:"2px solid "+(on?ACC:"transparent"),
                color:on?TXTH:MUT,
                padding:SP.md+"px "+SP.lg+"px",cursor:"pointer",fontSize:FS.md,fontWeight:on?700:600,
                whiteSpace:"nowrap",flexShrink:0,minWidth:62,
                transition:"color 0.15s ease, border-color 0.15s ease, background 0.15s ease"}}>
              {t.label}
            </button>
          );
        })}
      </div>

      {!isAdmin&&(
        <div style={{background:"rgba(245,158,11,0.08)",borderBottom:"1px solid rgba(245,158,11,0.2)",
          padding:"8px 16px",textAlign:"center",fontSize:12,color:YLW,fontWeight:600}}>
           조회 전용 모드
        </div>
      )}

      <main style={{maxWidth:1040,margin:"0 auto",padding:"18px 14px 60px"}}>
        {tab==="dashboard"&&<Dashboard items={items} logs={logs} pLogs={pLogs} setTab={setTab} isAdmin={isAdmin} visits={visits} todayVisits={todayVisits} goToInventory={goToInventory}/>}
        {tab==="produce"&&isAdmin&&<Produce items={items} setItems={setItems} logs={logs} setLogs={setLogs} fmls={fmls} setFmls={setFmls} pLogs={pLogs} setPLogs={setPLogs} showToast={showToast} user={user} onSaved={syncInBackground}/>}
        {tab==="inout"&&isAdmin&&<InOut items={items} setItems={setItems} logs={logs} setLogs={setLogs} showToast={showToast} user={user} isAdmin={isAdmin} onSaved={syncInBackground}/>}
        {tab==="inventory"&&<Inventory items={items} setItems={isAdmin?setItems:null} showToast={showToast} isAdmin={isAdmin} logs={logs} initialGroup={invFilter}/>}
        {tab==="monthly"&&<MonthlyChart logs={logs}/>}
        {tab==="forecast"&&<Forecast items={items} logs={logs}/>}
        {tab==="items"&&isAdmin&&<ItemManager items={items} setItems={setItems} showToast={showToast}/>}
      </main>

      {toast&&(
        <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",
          background:toast.color,color:"#fff",borderRadius:12,padding:"10px 24px",
          fontWeight:700,fontSize:14,zIndex:999,whiteSpace:"nowrap"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

function Dashboard({items,logs,pLogs,setTab,isAdmin,visits,todayVisits,goToInventory}){
  const [modal,setModal]=useState(null);
  const zero=items.filter(function(i){return i.stock===0;});
  const total=items.reduce(function(s,i){return s+i.stock;},0);
  const tLogs=logs.filter(function(l){return l.date===today();});
  const tIn=tLogs.filter(function(l){return l.type==="입고";}).reduce(function(s,l){return s+l.qty;},0);
  const tOut=tLogs.filter(function(l){return l.type==="출고";}).reduce(function(s,l){return s+l.qty;},0);
  const todayProd=pLogs.filter(function(p){return p.date===today();}).reduce(function(s,p){return s+p.outputKg;},0);

  const gStats=GROUPS.map(function(g){return{
    g,col:GCOL[g],icon:GICO[g],grad:GGRAD[g],
    count:items.filter(function(i){return i.group===g;}).length,
    stock:items.filter(function(i){return i.group===g;}).reduce(function(s,i){return s+i.stock;},0),
    zero:items.filter(function(i){return i.group===g&&i.stock===0;}).length,
  };});

  const last7=Array.from({length:7},function(_,i){
    const d=new Date(); d.setDate(d.getDate()-6+i);
    const ds=d.toISOString().slice(0,10);
    const dl=logs.filter(function(l){return l.date===ds;});
    return{
      label:(d.getMonth()+1)+"/"+(d.getDate()),
      isToday:ds===today(),
      in:dl.filter(function(l){return l.type==="입고";}).reduce(function(s,l){return s+l.qty;},0),
      out:dl.filter(function(l){return l.type==="출고";}).reduce(function(s,l){return s+l.qty;},0),
    };
  });
  const maxBar=Math.max.apply(null,last7.map(function(d){return Math.max(d.in,d.out);}));
  const mb=maxBar||1;

  const kpis=[
    {label:"전체 품목",val:items.length+"종",color:ACC,mk:"all"},
    {label:"총 재고량",val:comma(total)+"kg",color:SKY,mk:"total"},
    {label:"재고 없음",val:zero.length+"종",color:RED,mk:"zero"},
  ];
  if(isAdmin){
    kpis.push({label:"오늘 생산",val:todayProd>0?comma(todayProd)+"kg":"없음",color:PRP,mk:"produce",isNav:true});
  }

  return(
    <div>
      <SectionTitle title="대시보드"sub="세인비에스 창고 실시간 현황"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        {kpis.map(function(k){
          return(
            <Card key={k.label}
              onClick={function(){k.isNav?(k.mk&&setTab(k.mk)):setModal(k.mk);}}
              style={{padding:SP.xl+"px "+SP.lg+"px",position:"relative",overflow:"hidden",
                cursor:"pointer",background:CARD,borderLeft:"3px solid "+k.color,
                transition:"transform 0.15s ease, box-shadow 0.15s ease"}}
              onMouseOver={function(e){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 20px rgba(0,0,0,0.3)";}}
              onMouseOut={function(e){e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 1px 2px rgba(0,0,0,0.2), 0 4px 12px rgba(0,0,0,0.18)";}}
            >
              <div style={{position:"absolute",top:SP.md,right:SP.md,fontSize:FS.sm,color:MUT,fontWeight:600}}>&gt;</div>
              <div style={{fontSize:14,color:MUT,fontWeight:700,marginBottom:SP.sm}}>{k.label}</div>
              <div style={{fontSize:28,fontWeight:800,color:k.color,letterSpacing:"-0.3px",fontVariantNumeric:"tabular-nums"}}>{k.val}</div>
            </Card>
          );
        })}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[
          {label:"오늘 입고",val:comma(tIn)+"kg",color:GRN},
          {label:"오늘 출고",val:comma(tOut)+"kg",color:RED},
          {label:"처리건수",val:tLogs.length+"건",color:YLW},
        ].map(function(k){
          return(
            <Card key={k.label}
              onClick={function(){setModal("today");}}
              style={{padding:"12px 12px",
                cursor:"pointer",border:"1px solid "+k.color+"25"}}
              onMouseOver={function(e){e.currentTarget.style.transform="translateY(-2px)";}}
              onMouseOut={function(e){e.currentTarget.style.transform="translateY(0)";}}
            >
              <div style={{fontSize:13,color:MUT,fontWeight:700,marginBottom:6,whiteSpace:"nowrap"}}>{k.label}</div>
              <div style={{fontSize:16,fontWeight:900,color:k.color,whiteSpace:"nowrap"}}>{k.val}</div>
            </Card>
          );
        })}
      </div>

      <div style={{display:"grid",gap:10,marginBottom:14}}>
        {gStats.map(function(g){
          return(
            <div key={g.g}
              onClick={function(){goToInventory(g.g);}}
              style={{borderRadius:RAD.lg,padding:SP.lg+"px "+SP.xl+"px",background:CARD,
                border:"1px solid "+BRD,borderLeft:"3px solid "+g.col,position:"relative",overflow:"hidden",
                cursor:"pointer",transition:"transform 0.15s ease"}}
              onMouseOver={function(e){e.currentTarget.style.transform="translateY(-2px)";}}
              onMouseOut={function(e){e.currentTarget.style.transform="translateY(0)";}}
            >
              <div style={{display:"flex",alignItems:"center",gap:SP.md,marginBottom:SP.md}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:FS.lg,color:TXTH}}>{g.g}</div>
                  <div style={{fontSize:FS.sm,color:MUT,marginTop:1}}>{GDSC[g.g]}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:700,color:TXTH,fontVariantNumeric:"tabular-nums"}}>{comma(g.stock)}<span style={{fontSize:FS.sm,color:MUT,fontWeight:400,fontFamily:"inherit"}}>kg</span></div>
                  <div style={{fontSize:FS.sm,color:MUT}}>{g.count}종{g.zero>0&&<span style={{color:RED}}> 없음 {g.zero}종</span>}</div>
                </div>
                <span style={{color:MUT,fontSize:16,marginLeft:2}}>&gt;</span>
              </div>
              <div style={{background:BRD2,borderRadius:99,height:4}}>
                <div style={{width:(total>0?g.stock/total*100:0)+"%",height:"100%",background:g.col,borderRadius:99}}/>
              </div>
            </div>
          );
        })}
      </div>

      <Card style={{padding:"14px",marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:14,color:WHT,marginBottom:12}}> 최근 7일 입출고</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:90}}>
          {last7.map(function(d,i){
            return(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{display:"flex",gap:1,alignItems:"flex-end",height:72}}>
                  <div style={{width:13,background:d.isToday?GRN:GRN+"55",borderRadius:"2px 2px 0 0",
                    height:(d.in/mb*72)+"px",minHeight:d.in?3:0}}/>
                  <div style={{width:13,background:d.isToday?RED:RED+"55",borderRadius:"2px 2px 0 0",
                    height:(d.out/mb*72)+"px",minHeight:d.out?3:0}}/>
                </div>
                <div style={{fontSize:11,color:d.isToday?ACC:MUT,fontWeight:d.isToday?700:400}}>{d.label}</div>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:14,marginTop:8}}>
          <span style={{fontSize:12,color:GRN,display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:8,height:8,background:GRN,borderRadius:8,display:"inline-block"}}/>입고
          </span>
          <span style={{fontSize:12,color:RED,display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:8,height:8,background:RED,borderRadius:8,display:"inline-block"}}/>출고
          </span>
        </div>
      </Card>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        {[
          {label:"월별분석",sub:"입출고 추이",color:"#F472B6",nav:"monthly"},
          {label:"수요예측",sub:"재고 소진 예측",color:YLW,nav:"forecast"},
        ].map(function(b){
          return(
            <div key={b.nav} onClick={function(){setTab(b.nav);}}
              style={{background:CARD,border:"1px solid "+b.color+"30",borderRadius:12,
                padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all 0.15s"}}
              onMouseOver={function(e){e.currentTarget.style.transform="translateY(-2px)";}}
              onMouseOut={function(e){e.currentTarget.style.transform="translateY(0)";}}
            >
              <div style={{width:6,height:44,borderRadius:8,
                background:"linear-gradient(135deg,"+b.color+","+b.color+"99)",flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:14,color:b.color}}>{b.label}</div>
                <div style={{fontSize:12,color:MUT}}>{b.sub}</div>
              </div>
              <span style={{color:b.color,fontSize:18}}>&gt;</span>
            </div>
          );
        })}
      </div>

      <Card>
        <div style={{padding:"12px 16px",borderBottom:"1px solid "+BRD2,display:"flex",
          justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:700,fontSize:14,color:WHT}}> 최근 활동</span>
          {isAdmin&&<button onClick={function(){setTab("inout");}}
            style={{background:"rgba(138,106,53,0.12)",border:"1px solid "+ACC,
              borderRadius:8,color:ACCL,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}>
            전체보기 &gt;
          </button>}
        </div>
        {logs.slice(0,6).map(function(l){
          return(
            <div key={l.id} style={{display:"flex",alignItems:"center",gap:10,
              padding:"10px 16px",borderBottom:"1px solid "+BRD2}}>
              <span style={{background:l.type==="입고"?"rgba(16,185,129,0.12)":"rgba(244,63,94,0.12)",
                color:l.type==="입고"?GRN:RED,borderRadius:8,padding:"6px 12px",
                fontSize:12,fontWeight:800,flexShrink:0}}>{l.type}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:TXTH,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.itemName}</div>
                <div style={{fontSize:12,color:MUT}}>{l.group}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontWeight:900,fontSize:16,color:WHT}}>{comma(l.qty)}<span style={{fontSize:11,color:MUT,fontWeight:400}}>{l.unit}</span></div>
                <div style={{fontSize:11,color:MUT}}>{l.time}</div>
              </div>
            </div>
          );
        })}
      </Card>

      {zero.length>0&&(
        <div onClick={function(){setModal("zero");}}
          style={{background:"rgba(244,63,94,0.06)",border:"1px solid rgba(244,63,94,0.25)",
            borderRadius:12,padding:"12px 16px",marginTop:12,cursor:"pointer"}}
          onMouseOver={function(e){e.currentTarget.style.background="rgba(244,63,94,0.1)";}}
          onMouseOut={function(e){e.currentTarget.style.background="rgba(244,63,94,0.06)";}}
        >
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{color:RED,fontWeight:700,fontSize:14}}>{"재고 없음 ("+zero.length+"종)"}</span>
            <span style={{color:RED,fontSize:12,fontWeight:700}}>자세히 보기 </span>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {zero.map(function(i){
              return(
                <span key={i.id} style={{background:"rgba(244,63,94,0.1)",border:"1px solid rgba(244,63,94,0.3)",
                  color:RED,borderRadius:8,padding:"4px 14px",fontSize:12,fontWeight:600}}>
                  {i.name}
                </span>
              );
            })}
          </div>
        </div>
      )}

      {isAdmin&&(
        <div onClick={function(){setModal("visits");}}
          style={{marginTop:12,background:CARD,border:"1px solid "+PRP+"30",borderRadius:12,
            padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}
          onMouseOver={function(e){e.currentTarget.style.transform="translateY(-2px)";}}
          onMouseOut={function(e){e.currentTarget.style.transform="translateY(0)";}}
        >
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:8,background:"rgba(129,140,248,0.18)",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:400,whiteSpace:"nowrap"}}></div>
            <div>
              <div style={{fontSize:12,color:MUT}}>오늘 방문자 (관리자 전용)</div>
              <div style={{fontSize:12,color:PRP,marginTop:1}}>{"오늘 로그인 "+(todayVisits?todayVisits.length:0)+"회"}</div>
            </div>
          </div>
          <span style={{color:PRP,fontSize:18,opacity:0.6}}>&gt;</span>
        </div>
      )}

      {modal&&(
        <div onClick={function(){setModal(null);}}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:500,
            display:"flex",alignItems:"flex-end",backdropFilter:"blur(4px)"}}>
          <div onClick={function(e){e.stopPropagation();}}
            style={{background:CARD,borderRadius:"22px 22px 0 0",border:"1px solid "+BRD,
              width:"100%",maxWidth:640,margin:"0 auto",maxHeight:"80vh",overflowY:"auto",paddingBottom:32}}>
            <div style={{display:"flex",justifyContent:"center",paddingTop:12,marginBottom:4}}>
              <div style={{width:36,height:4,background:BRD,borderRadius:99}}/>
            </div>
            <div style={{position:"sticky",top:0,background:CARD,padding:"12px 20px 14px",
              borderBottom:"1px solid "+BRD2,display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:1}}>
              <div style={{fontWeight:800,fontSize:18,color:WHT}}>
                {modal==="all"&&("전체 품목 ("+items.length+"종)")}
                {modal==="total"&&"총 재고량 현황"}

              {modal==="total"&&(

                  </div>

                    const gs=items.filter(function(i){return i.group===g;});

              )}
              {modal==="zero"&&(
                <div>
                  {zero.length===0?(
                    <div style={{textAlign:"center",padding:"40px",color:GRN}}>
                      <div style={{fontSize:44,marginBottom:10}}></div>
                      <div style={{fontSize:16,fontWeight:700}}>재고 없음 품목이 없습니다!</div>
                    </div>
                  ):(
                    <div>
                      {GROUPS.map(function(g){
                        const gz=zero.filter(function(i){return i.group===g;});
                        if(!gz.length)return null;
                        return(
                          <div key={g} style={{marginBottom:12}}>
                            <div style={{fontSize:12,color:GCOL[g],fontWeight:700,marginBottom:7}}>{g} ({gz.length}종)</div>
                            {gz.map(function(item){
                              return(
                                <div key={item.id} style={{display:"flex",alignItems:"center",gap:12,
                                  padding:"10px 16px",background:SURF,borderRadius:8,marginBottom:5,
                                  border:"1px solid rgba(244,63,94,0.3)"}}>
                                  <div style={{width:38,height:38,borderRadius:8,background:"rgba(244,63,94,0.1)",
                                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:400,whiteSpace:"nowrap",flexShrink:0}}></div>
                                  <div style={{flex:1,minWidth:0}}>
                                    <div style={{fontWeight:700,fontSize:14,color:TXTH,
                                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
                                    <div style={{fontSize:12,color:MUT}}>{""+item.loc+" - "+item.id}</div>
                                  </div>
                                  <span style={{background:"rgba(244,63,94,0.12)",color:RED,
                                    borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:800,flexShrink:0}}>재고없음</span>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                      <button onClick={function(){setModal(null);goToInventory("전체");}}
                        style={{width:"100%",padding:"12px",borderRadius:12,border:"none",cursor:"pointer",
                          background:"linear-gradient(135deg,#8A6A35,#A3804A)",
                          color:"#fff",fontWeight:800,fontSize:14,marginTop:8}}>
                        재고현황 탭에서 확인하기 &gt;
                      </button>
                    </div>
                  )}
                </div>
              )}
              {modal==="today"&&(
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                    <Card style={{padding:"14px",textAlign:"center"}}>
                      <div style={{fontSize:12,color:MUT,marginBottom:4}}>오늘 입고</div>
                      <div style={{fontSize:18,fontWeight:900,color:GRN}}>{comma(tIn)}<span style={{fontSize:12,color:MUT,fontWeight:400}}>kg</span></div>
                    </Card>
                    <Card style={{padding:"14px",textAlign:"center"}}>
                      <div style={{fontSize:12,color:MUT,marginBottom:4}}>오늘 출고</div>
                      <div style={{fontSize:18,fontWeight:900,color:RED}}>{comma(tOut)}<span style={{fontSize:12,color:MUT,fontWeight:400}}>kg</span></div>
                    </Card>
                  </div>
                  {tLogs.length===0?(
                    <div style={{textAlign:"center",padding:"40px",color:MUT,fontSize:14}}>오늘 입출고 이력이 없습니다</div>
                  ):(
                    <Card style={{overflow:"hidden"}}>
                      {tLogs.map(function(l,li){
                        return(
                          <div key={l.id} style={{display:"flex",alignItems:"center",gap:8,
                            padding:"10px 14px",borderBottom:li===tLogs.length-1?"none":"1px solid "+BRD2}}>
                            <span style={{background:l.type==="입고"?"rgba(16,185,129,0.12)":"rgba(244,63,94,0.12)",
                              color:l.type==="입고"?GRN:RED,borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:800,flexShrink:0}}>{l.type}</span>
                            <div style={{flex:1,minWidth:0,overflow:"hidden"}}>
                              <div style={{fontWeight:700,fontSize:14,color:TXTH,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.itemName}</div>
                              <div style={{fontSize:11,color:MUT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.partner}</div>
                            </div>
                            <div style={{textAlign:"right",flexShrink:0}}>
                              <div style={{fontWeight:900,fontSize:14,color:WHT}}>{comma(l.qty)}<span style={{fontSize:11,color:MUT,fontWeight:400}}>{l.unit}</span></div>
                              <div style={{fontSize:11,color:MUT}}>{l.time}</div>
                            </div>
                          </div>
                        );
                      })}
                    </Card>
                  )}
                </div>
              )}
              {modal==="visits"&&(function(){
                var byUser={};
                visits.forEach(function(v){
                  if(!byUser[v.userName])byUser[v.userName]={count:0,role:v.role};
                  byUser[v.userName].count++;
                });
                var userList=Object.keys(byUser).map(function(name){
                  return{name:name,count:byUser[name].count,role:byUser[name].role};
                }).sort(function(a,b){return b.count-a.count;});
                return(
                  <div>
                    <div style={{background:SURF,borderRadius:12,padding:"16px",marginBottom:16,textAlign:"center",border:"1px solid "+PRP+"30"}}>
                      <div style={{fontSize:12,color:MUT,marginBottom:5}}>전체 누적 로그인</div>
                      <div style={{fontSize:34,fontWeight:900,color:PRP}}>{visits.length}<span style={{fontSize:14,color:MUT,fontWeight:400}}>회</span></div>
                    </div>
                    <div style={{fontWeight:700,fontSize:14,color:MUT,marginBottom:10}}>사용자별 로그인 횟수</div>
                    <div style={{display:"grid",gap:7,marginBottom:18}}>
                      {userList.length===0?(
                        <div style={{textAlign:"center",padding:"16px",color:MUT,fontSize:14}}>로그인 기록이 없습니다</div>
                      ):userList.map(function(u){
                        return(
                          <div key={u.name} style={{display:"flex",alignItems:"center",gap:10,
                            padding:"10px 16px",background:SURF,borderRadius:8,border:"1px solid "+BRD2}}>

                              background:u.role==="admin"?"rgba(201,166,107,0.12)":"rgba(245,158,11,0.12)",
                              borderRadius:8,padding:"6px 12px",flexShrink:0}}>{u.role==="admin"?"관리자":"조회"}</span>
                            <span style={{flex:1,fontSize:14,fontWeight:700,color:TXTH}}>{u.name}</span>
                            <span style={{fontSize:16,fontWeight:900,color:PRP}}>{u.count}<span style={{fontSize:12,color:MUT,fontWeight:400}}>회</span></span>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{fontWeight:700,fontSize:14,color:MUT,marginBottom:10}}>최근 로그인 기록</div>
                    {visits.length===0?(
                      <div style={{textAlign:"center",padding:"30px",color:MUT,fontSize:14}}>로그인 기록이 없습니다</div>
                    ):(
                      <Card style={{overflow:"hidden"}}>
                        {visits.slice(0,30).map(function(v,vi){
                          return(
                            <div key={v.id} style={{display:"flex",alignItems:"center",gap:10,
                              padding:"10px 14px",borderBottom:vi===Math.min(29,visits.length-1)?"none":"1px solid "+BRD2}}>
                              <span style={{fontSize:11,color:v.role==="admin"?ACCL:YLW,fontWeight:700,
                                background:v.role==="admin"?"rgba(201,166,107,0.12)":"rgba(245,158,11,0.12)",
                                borderRadius:8,padding:"6px 12px",flexShrink:0}}>{v.role==="admin"?"관리자":"조회"}</span>
                              <span style={{flex:1,fontSize:14,fontWeight:600,color:TXTH}}>{v.userName}</span>
                              <span style={{fontSize:12,color:MUT,flexShrink:0}}>{v.date+" "+v.time}</span>

                    )}

                );
              })()}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Produce({items,setItems,logs,setLogs,fmls,setFmls,pLogs,setPLogs,showToast,user,onSaved}){
  const [mode,setMode]=useState("execute");
  const [selF,setSelF]=useState(null);
  const [kg,setKg]=useState("");
  const [memo,setMemo]=useState("");
  const [prev,setPrev]=useState(null);
  const [nf,setNf]=useState({productName:"",productId:"",desc:"",ingredients:[]});
  const [nIng,setNIng]=useState({itemId:"",kgPer250:""});

  useEffect(function(){
    if(!selF||!kg||isNaN(parseFloat(kg)))return setPrev(null);
    const kgN=parseFloat(kg);
    const batches=kgN/250;
    const reqs=selF.ingredients.map(function(ing){
      const item=items.find(function(i){return i.id===ing.itemId;});
      const need=Math.round(ing.kgPer250*batches*100)/100;
      return Object.assign({},ing,{need:need,current:item?item.stock:0,ok:item?item.stock>=need:false});
    });
    setPrev({kgN,batches,reqs,canProduce:reqs.every(function(r){return r.ok;})});
  },[selF,kg,items]);

  function executeProduce(){
    if(!selF||!prev||!prev.canProduce)return;
    const ds=today(),ts=nowTime();
    var ni=items.map(function(item){
      var req=prev.reqs.find(function(r){return r.itemId===item.id;});
      if(req)return Object.assign({},item,{stock:Math.round((item.stock-req.need)*100)/100});
      return item;
    });
    ni=ni.map(function(i){
      if(i.id===selF.productId)return Object.assign({},i,{stock:Math.round((i.stock+prev.kgN)*100)/100});
      return i;
    });
    setItems(ni);
    const plog={id:Date.now(),date:ds,time:ts,formulaId:selF.id,formulaName:selF.productName,
      productId:selF.productId,outputKg:prev.kgN,batches:prev.batches,
      ingredients:prev.reqs.map(function(r){return{name:r.name,used:r.need};}),
      memo:memo,by:user.name};
    setPLogs(function(p){return [plog].concat(p);});
    const inLog={id:Date.now()+1,date:ds,time:ts,itemId:selF.productId,itemName:selF.productName,
      group:"비에스",type:"입고",qty:prev.kgN,unit:"kg",partner:"자체생산",memo:"제조지시서 "+selF.id,by:user.name};
    setLogs(function(p){return [inLog].concat(p);});
    showToast("생산 완료! "+selF.productName+" "+comma(prev.kgN)+"kg");
    setSelF(null);setKg("");setMemo("");setPrev(null);
    apiPost("addProdLog",{data:prodLogToRow(plog)}).catch(function(){});
    apiPost("addLog",{data:logToRow(inLog)}).catch(function(){});
    prev.reqs.forEach(function(r){
      var it=ni.find(function(x){return x.id===r.itemId;});
      if(it)apiPost("updateItem",{id:r.itemId,data:{"재고량":it.stock}}).catch(function(){});
    });
    var prodItem=ni.find(function(x){return x.id===selF.productId;});
    if(prodItem)apiPost("updateItem",{id:selF.productId,data:{"재고량":prodItem.stock}}).catch(function(){});
    if(onSaved)setTimeout(onSaved,800);
  }

  function addIng(){
    if(!nIng.itemId||!nIng.kgPer250){showToast("원료와 배합량을 입력하세요",RED);return;}
    const item=items.find(function(i){return i.id===nIng.itemId;});
    if(!item)return;
    if(nf.ingredients.find(function(i){return i.itemId===nIng.itemId;})){showToast("이미 추가된 원료입니다",YLW);return;}
    setNf(function(p){return Object.assign({},p,{ingredients:p.ingredients.concat([{itemId:nIng.itemId,name:item.name,kgPer250:parseFloat(nIng.kgPer250)}])});});
    setNIng({itemId:"",kgPer250:""});
  }

  function saveFml(){
    if(!nf.productName||!nf.productId||nf.ingredients.length===0){showToast("제품명, 완제품, 원료를 모두 입력하세요",RED);return;}
    const fid="F"+String(fmls.length+1).padStart(3,"0");
    const newFml=Object.assign({},nf,{id:fid});
    setFmls(function(p){return p.concat([newFml]);});
    showToast("제조지시서 등록 완료 - "+nf.productName);
    setNf({productName:"",productId:"",desc:"",ingredients:[]});
    setMode("execute");
    apiPost("addFormula",{rows:formulaToRows(newFml)}).catch(function(){showToast("서버 저장 실패",YLW);});
  }

  const rawItems=items.filter(function(i){return i.group==="원료";});
  const btnStyle=function(active,col){return{padding:"6px 12px",borderRadius:12,cursor:"pointer",
    border:"2px solid "+(active?col:BRD),background:active?col+"20":"transparent",
    color:active?col:MUT,fontWeight:active?800:600,
    display:"flex",flexDirection:"column",alignItems:"center",gap:4};};

  return(
    <div>
      <div style={{marginBottom:16,paddingBottom:14,borderBottom:"1px solid "+BRD2}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{width:40,height:40,borderRadius:8,flexShrink:0,
            background:"rgba(129,140,248,0.18)",border:"1px solid rgba(129,140,248,0.35)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:400,whiteSpace:"nowrap"}}></div>
          <div>
            <div style={{fontSize:18,fontWeight:900,color:WHT}}>생산 관리</div>
            <div style={{fontSize:12,color:MUT}}>제조지시서 기반 생산 실행</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[{k:"execute",label:"생산실행"},{k:"register",label:"배합비등록"},{k:"history",label:"생산이력"}].map(function(b){
            return(
              <button key={b.k} onClick={function(){setMode(b.k);}} style={btnStyle(mode===b.k,PRP)}>
                <span style={{fontSize:18}}>{b.icon}</span>
                <span style={{fontSize:12}}>{b.label}</span>
              </button>
            );
          })}
        </div>
      </div>

      {mode==="execute"&&(
        <div>
          <div style={{fontSize:14,color:MUT,marginBottom:14,fontWeight:600}}> 제조지시서를 선택하고 생산량을 입력하세요</div>
          <div style={{display:"grid",gap:10,marginBottom:16}}>
            {fmls.map(function(f){
              const on=selF&&selF.id===f.id;
              const prod=items.find(function(i){return i.id===f.productId;});
              return(
                <div key={f.id} onClick={function(){setSelF(on?null:f);setKg("");setPrev(null);}}
                  style={{background:on?"rgba(129,140,248,0.1)":CARD,
                    border:"2px solid "+(on?PRP:BRD),borderRadius:12,
                    padding:"15px 17px",cursor:"pointer",transition:"all 0.18s"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:36,height:36,borderRadius:8,background:"rgba(129,140,248,0.2)",
                        display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:400,whiteSpace:"nowrap"}}></div>
                      <div>
                        <div style={{fontWeight:800,fontSize:14,color:on?PRP:TXTH}}>{f.productName}</div>
                        <div style={{fontSize:12,color:MUT}}>{f.id}{f.desc?" - "+f.desc:""}</div>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:12,color:MUT}}>현재 재고</div>
                      <div style={{fontSize:14,fontWeight:800,color:GRN}}>{prod?comma(prod.stock):"-"}<span style={{fontSize:11,color:MUT,fontWeight:400}}>kg</span></div>
                    </div>
                    <button onClick={function(e){
                        e.stopPropagation();
                        if(on){setSelF(null);setKg("");setPrev(null);}
                        setFmls(function(p){return p.filter(function(x){return x.id!==f.id;});});
                        showToast("제조지시서 삭제 - "+f.productName,YLW);
                        apiPost("deleteFormula",{id:f.id}).catch(function(){});
                      }}
                      style={{background:"transparent",border:"1px solid rgba(244,63,94,0.35)",
                        borderRadius:8,color:RED,padding:"6px 12px",cursor:"pointer",
                        fontSize:12,fontWeight:700,marginLeft:8,flexShrink:0}}>삭제</button>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {f.ingredients.map(function(ing){
                      return(
                        <span key={ing.itemId} style={{background:SURF,border:"1px solid "+BRD,
                          borderRadius:8,padding:"6px 12px",fontSize:12,color:TXT}}>
                          {ing.name} <span style={{color:SKY,fontWeight:700}}>{ing.kgPer250}</span><span style={{color:MUT,fontSize:11}}>kg/250</span>
                        </span>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>

          {selF&&(
            <Card style={{padding:18,border:"1px solid "+PRP+"40"}}>
              <div style={{fontWeight:700,fontSize:14,color:PRP,marginBottom:14}}>{"생산 실행 - "+selF.productName}</div>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:12,color:MUT,marginBottom:8,fontWeight:700}}>생산량 (kg)</div>

function InOut({items,setItems,logs,setLogs,showToast,user,isAdmin,onSaved}){
  const [mode,setMode]=useState("inout");
  const [form,setForm]=useState({itemId:"",type:"입고",qty:"",partner:"",memo:""});
  const [nItem,setNItem]=useState({name:"",group:"원료",stock:"",unit:"kg",loc:""});
  const [ft,setFt]=useState("전체");
  const [fg,setFg]=useState("전체");
  const [search,setSearch]=useState("");
  const [fDate,setFDate]=useState("");
  const [editLog,setEditLog]=useState(null);
  const [editQty,setEditQty]=useState("");
  const [delLogId,setDelLogId]=useState(null);
  const sel=items.find(function(i){return i.id===form.itemId;});

  function startEditLog(l){setEditLog(l.id);setEditQty(String(l.qty));}

  function saveEditLog(l){
    var nq=parseFloat(editQty);
    if(isNaN(nq)||nq<=0){showToast("수량을 올바르게 입력하세요",RED);return;}
    var diff=nq-l.qty;
    var delta=l.type==="입고"?diff:-diff;
    var targetItem=items.find(function(it){return it.id===l.itemId;});
    var newStock=targetItem?Math.round((targetItem.stock+delta)*100)/100:0;
    if(newStock<0){showToast("수정 시 재고가 음수가 됩니다 (현재고 "+(targetItem?comma(targetItem.stock):0)+targetItem.unit+")",RED);return;}
    var auditNote=(l.memo?l.memo+" | ":"")+"[수정: "+user.name+" "+today()+" "+nowTime()+", "+l.qty+"→"+nq+l.unit+"]";
    setLogs(function(p){return p.map(function(x){return x.id===l.id?Object.assign({},x,{qty:nq,memo:auditNote}):x;});});
    setItems(function(p){return p.map(function(it){
      if(it.id!==l.itemId)return it;
      return Object.assign({},it,{stock:newStock});
    });});
    showToast("수량 수정 완료 - "+l.itemName);
    setEditLog(null);
    apiPost("updateLog",{id:l.id,data:{"수량":nq,"메모":auditNote}}).catch(function(){});
    if(targetItem)apiPost("updateItem",{id:l.itemId,data:{"재고량":newStock}}).catch(function(){});
  }

  function deleteLog(l){
    var delta=l.type==="입고"?-l.qty:l.qty;
    var targetItem=items.find(function(it){return it.id===l.itemId;});
    var newStock=targetItem?Math.round((targetItem.stock+delta)*100)/100:0;
    setLogs(function(p){return p.filter(function(x){return x.id!==l.id;});});
    setItems(function(p){return p.map(function(it){
      if(it.id!==l.itemId)return it;
      return Object.assign({},it,{stock:newStock});
    });});
    showToast("이력 삭제 및 재고 복원 완료",YLW);
    setDelLogId(null);
    apiPost("deleteLog",{id:l.id}).catch(function(){});
    if(targetItem)apiPost("updateItem",{id:l.itemId,data:{"재고량":newStock}}).catch(function(){});
  }

  function submitInOut(){
    if(!form.itemId||!form.qty||!form.partner){showToast("필수 항목을 입력하세요",RED);return;}
    const qty=parseInt(form.qty);
    if(isNaN(qty)||qty<=0){showToast("수량을 올바르게 입력하세요",RED);return;}
    if(form.type==="출고"&&sel.stock<qty){showToast("재고 부족! 현재고: "+comma(sel.stock)+sel.unit,RED);return;}
    const log={id:Date.now(),date:today(),time:nowTime(),itemId:form.itemId,itemName:sel.name,
      group:sel.group,type:form.type,qty,unit:sel.unit,partner:form.partner,memo:form.memo,by:user.name};
    const newStock=form.type==="입고"?sel.stock+qty:sel.stock-qty;
    setLogs(function(p){return [log].concat(p);});
    setItems(function(p){return p.map(function(i){
      if(i.id!==form.itemId)return i;
      return Object.assign({},i,{stock:newStock});
    });});
    showToast(form.type+" 완료 - "+sel.name+" "+comma(qty)+sel.unit);
    setForm(function(p){return Object.assign({},p,{itemId:"",qty:"",partner:"",memo:""});});
    apiPost("addLog",{data:logToRow(log)}).catch(function(){showToast("서버 저장 실패 - 새로고침 시 사라질 수 있어요",YLW);});
    apiPost("updateItem",{id:sel.id,data:{"재고량":newStock}}).catch(function(){});
    if(onSaved)setTimeout(onSaved,800);
  }

  function submitNItem(){
    if(!nItem.name){showToast("품목명을 입력하세요",RED);return;}
    const stock=nItem.stock?parseInt(nItem.stock):0;
    const pre=nItem.group==="원료"?"M":nItem.group==="비에스"?"P":"B";
    const ex=items.filter(function(i){return i.id.startsWith(pre);});
    const n=ex.length>0?Math.max.apply(null,ex.map(function(i){return parseInt(i.id.slice(1));}))+1:1;
    const newId=pre+String(n).padStart(3,"0");
    const newItem=Object.assign({},nItem,{id:newId,stock:stock});
    setItems(function(p){return p.concat([newItem]);});
    showToast("품목 추가 - "+nItem.name);
    setNItem({name:"",group:"원료",stock:"",unit:"kg",loc:""});
    setMode("inout");
    apiPost("addItem",{data:itemToRow(newItem)}).catch(function(){showToast("서버 저장 실패",YLW);});
  }

  const filtered=logs.filter(function(l){
    if(ft!=="전체"&&l.type!==ft)return false;
    if(fg!=="전체"&&l.group!==fg)return false;
    if(fDate&&l.date!==fDate)return false;
    if(search&&!l.itemName.includes(search)&&!l.partner.includes(search))return false;
    return true;
  });
  const availDates=Array.from(new Set(logs.map(function(l){return l.date;}))).sort().reverse();

  return(
    <div>
      <div style={{marginBottom:16,paddingBottom:14,borderBottom:"1px solid "+BRD2}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{width:40,height:40,borderRadius:8,flexShrink:0,
            background:"rgba(16,185,129,0.15)",border:"1px solid rgba(16,185,129,0.3)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:400,whiteSpace:"nowrap"}}></div>
          <div style={{flex:1}}>
            <div style={{fontSize:18,fontWeight:900,color:WHT}}>입출고 관리</div>
            <div style={{fontSize:12,color:MUT}}>{user.name} 담당</div>
          </div>
          <div style={{display:"flex",gap:7,flexShrink:0}}>
            {[{k:"inout",label:"입출고",col:ACC},{k:"today",label:"오늘출고",col:YLW},{k:"additem",label:"품목추가",col:GRN}].map(function(b){
              const on=mode===b.k;
              return(
                <button key={b.k} onClick={function(){setMode(b.k);}}
                  style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                    padding:"8px 14px",borderRadius:8,cursor:"pointer",
                    border:"2px solid "+(on?b.col:BRD),
                    background:on?b.col+"18":"transparent",
                    color:on?b.col:MUT,fontSize:12,fontWeight:on?800:600,minWidth:56}}>
                  <span style={{fontSize:16}}>{b.icon}</span>
                  <span>{b.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {mode==="inout"&&(
        <Card style={{padding:18,marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,color:WHT,marginBottom:13}}> 입출고 등록</div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:MUT,marginBottom:7,fontWeight:700}}>품목 선택 *</div>
            <select value={form.itemId} onChange={function(e){setForm(function(p){return Object.assign({},p,{itemId:e.target.value});});}}
              style={{width:"100%",background:SURF,border:"1px solid "+BRD,borderRadius:8,
                color:form.itemId?TXTH:MUT,padding:"10px 14px",fontSize:14,colorScheme:"dark"}}>
              <option value="">-- 품목 선택 --</option>
              {GROUPS.map(function(g){
                return(
                  <optgroup key={g} label={g}>
                    {items.filter(function(i){return i.group===g;}).map(function(i){
                      return <option key={i.id} value={i.id}>{i.name} | 재고: {comma(i.stock)}{i.unit}</option>;
                    })}
                  </optgroup>
                );
              })}
            </select>
          </div>
          {sel&&(
            <div style={{background:SURF,border:"1px solid "+BRD,borderRadius:8,
              padding:"8px 14px",marginBottom:12,display:"flex",gap:12,fontSize:12,flexWrap:"wrap"}}>
              <span style={{color:GCOL[sel.group],fontWeight:700}}>{sel.group}</span>
              <span style={{color:MUT}}>{""+sel.loc}</span>
              <span style={{color:MUT}}>현재고: <span style={{color:ACCL,fontWeight:800,fontSize:14}}>{comma(sel.stock)}{sel.unit}</span></span>
            </div>
          )}
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            {["입고","출고"].map(function(t){
              const on=form.type===t;
              const col=t==="입고"?GRN:RED;
              return(
                <button key={t} onClick={function(){setForm(function(p){return Object.assign({},p,{type:t});});}}
                  style={{flex:1,padding:"12px",borderRadius:8,cursor:"pointer",fontWeight:800,fontSize:16,

              );

          </div>
          {[{l:"수량",k:"qty",ph:"수량 입력",tp:"number"},{l:"거래처",k:"partner",ph:"거래처명"},{l:"메모",k:"memo",ph:"비고(선택)"}].map(function(f){

      {mode==="today"&&(function(){

                  <div style={{fontSize:12,color:MUT}}>오늘({today()}) 출고 현황</div>

                <div style={{fontSize:22,fontWeight:900,color:YLW}}>{comma(tTotal)}<span style={{fontSize:12,color:MUT,fontWeight:400}}>kg</span></div>

            </Card>

            {todayOut.length===0?(
              <Card style={{padding:"30px",textAlign:"center",color:MUT,fontSize:14}}>오늘 출고 이력이 없습니다</Card>

      {mode==="additem"&&(

          <div style={{display:"flex",gap:8,marginBottom:13}}>
            {GROUPS.map(function(g){
              const on=nItem.group===g;
              return(
                <button key={g} onClick={function(){setNItem(function(p){return Object.assign({},p,{group:g});});}}
                  style={{flex:1,padding:"6px 12px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12,

                <option value="L">L</option>

            <div style={{fontSize:12,color:MUT,marginBottom:7,fontWeight:700}}>위치 (선택)</div>
            <input type="text"placeholder="A-01"value={nItem.loc}
              onChange={function(e){setNItem(function(p){return Object.assign({},p,{loc:e.target.value});});}}
              style={{width:"100%",background:SURF,border:"1px solid "+BRD,borderRadius:8,color:TXTH,padding:"10px 14px",fontSize:14}}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={function(){setMode("inout");}}

            <button onClick={submitNItem}
              style={{flex:2,padding:"12px",borderRadius:12,border:"none",cursor:"pointer",
                background:"linear-gradient(135deg,"+GRN+",#059669)",color:"#fff",fontWeight:800,fontSize:14}}> 품목 추가</button>
          </div>
        </Card>
      )}

      <GroupTabs active={fg} onChange={setFg}/>
      <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        {["전체","입고","출고"].map(function(f){
          const on=ft===f;
          return(
            <button key={f} onClick={function(){setFt(f);}}
              style={{background:on?"rgba(138,106,53,0.12)":"transparent",border:"1px solid "+(on?ACC:BRD),
                color:on?ACCL:MUT,borderRadius:8,padding:"6px 16px",cursor:"pointer",fontSize:14,fontWeight:on?700:400}}>{f}</button>
          );
        })}
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="품목·거래처 검색"
          style={{marginLeft:"auto",background:SURF,border:"1px solid "+BRD,borderRadius:8,color:TXT,padding:"6px 12px",fontSize:14,width:160}}/>
      </div>

      {/* 날짜 검색 */}
      <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
        <input type="date" value={fDate} onChange={function(e){setFDate(e.target.value);}}
          style={{background:SURF,border:"1px solid "+(fDate?ACC:BRD),borderRadius:8,
            color:fDate?ACCL:TXT,padding:"6px 12px",fontSize:14,colorScheme:"dark"}}/>
        {fDate&&<button onClick={function(){setFDate("");}}
          style={{background:"transparent",border:"1px solid "+BRD,borderRadius:8,color:MUT,
            padding:"6px 12px",cursor:"pointer",fontSize:12}}>날짜 초기화</button>}
        <div style={{display:"flex",gap:6,overflowX:"auto",flex:1,minWidth:0}}>
          {availDates.slice(0,10).map(function(d){
            var dd=new Date(d);
            var label=(dd.getMonth()+1)+"/"+dd.getDate();
            var on=fDate===d;
            return(
              <button key={d} onClick={function(){setFDate(on?"":d);}}
                style={{flexShrink:0,background:on?"rgba(138,106,53,0.12)":"transparent",
                  border:"1px solid "+(on?ACC:BRD),borderRadius:8,color:on?ACCL:MUT,
                  padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:on?700:400,whiteSpace:"nowrap"}}>
                {label}
              </button>
            );
          })}
        </div>
      </div>

      {filtered.length===0?(
        <Card style={{padding:"30px",textAlign:"center",color:MUT,fontSize:14}}>
          {fDate?("해당 날짜("+fDate+")에 이력이 없습니다"):"이력이 없습니다"}
        </Card>
      ):(
        (function(){
          var byDate={};
          var order=[];
          filtered.forEach(function(l){
            if(!byDate[l.date]){byDate[l.date]=[];order.push(l.date);}
            byDate[l.date].push(l);
          });
          return order.map(function(date){
            var dayLogs=byDate[date];
            var dIn=dayLogs.filter(function(l){return l.type==="입고";}).reduce(function(s,l){return s+l.qty;},0);
            var dOut=dayLogs.filter(function(l){return l.type==="출고";}).reduce(function(s,l){return s+l.qty;},0);
            var d=new Date(date);
            var wday=["일","월","화","수","목","금","토"][d.getDay()];
            var dLabel=(d.getMonth()+1)+"월"+d.getDate()+"일 ("+wday+")";
            return(
              <div key={date} style={{marginBottom:14}}>
                <Card style={{overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,
                  padding:"10px 14px",background:CARD,borderBottom:"1px solid "+BRD}}>
                  <span style={{fontWeight:800,fontSize:14,color:WHT}}>{dLabel}</span>
                  <span style={{fontSize:12,color:MUT}}>{dayLogs.length}건</span>
                  <span style={{marginLeft:"auto",display:"flex",gap:12,fontSize:12}}>
                    <span style={{color:GRN,fontWeight:700}}>{"↓ "+comma(dIn)+"kg"}</span>
                    <span style={{color:RED,fontWeight:700}}>{"↑ "+comma(dOut)+"kg"}</span>
                  </span>
                </div>
                <div style={{display:"grid",gap:0}}>
                  {(function(){
                    var inN=0, outN=0;
                    return dayLogs.map(function(l,li){
                      var no = l.type==="입고" ? ++inN : ++outN;
                      var isLast = li===dayLogs.length-1;
                      var isEdit = editLog===l.id;
                      var isDel = delLogId===l.id;
                      return(
                        <div key={l.id} style={{padding:"8px 14px",borderBottom:isLast?"none":"1px solid "+BRD2}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:12,fontWeight:800,color:l.type==="입고"?GRN:RED,
                              minWidth:18,flexShrink:0}}>{no+"."}</span>
                            <span style={{background:l.type==="입고"?"rgba(16,185,129,0.12)":"rgba(244,63,94,0.12)",
                              color:l.type==="입고"?GRN:RED,borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:800,flexShrink:0,whiteSpace:"nowrap"}}>{l.type}</span>
                            <span style={{flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                              fontSize:14,color:TXTH}}>
                              <span style={{fontWeight:700}}>{l.itemName}</span>
                              {isEdit?(
                                <input type="number" value={editQty} onChange={function(e){setEditQty(e.target.value);}} autoFocus
                                  style={{width:70,background:SURF,border:"1px solid "+ACC,borderRadius:8,
                                    color:TXTH,padding:"4px 6px",fontSize:12,marginLeft:6}}/>
                              ):(
                                <span style={{color:MUT}}> {comma(l.qty)}{l.unit} ({l.partner})</span>
                              )}
                            </span>
                            <span style={{fontSize:11,color:MUT,flexShrink:0,whiteSpace:"nowrap"}}>{l.time}</span>
                            {isAdmin&&!isEdit&&!isDel&&(
                              <div style={{display:"flex",gap:4,flexShrink:0}}>
                                <button onClick={function(){startEditLog(l);}}
                                  style={{background:"transparent",border:"1px solid "+BRD,borderRadius:8,color:MUT,
                                    padding:"6px 12px",cursor:"pointer",fontSize:11}}>수정</button>
                                <button onClick={function(){setDelLogId(l.id);}}
                                  style={{background:"transparent",border:"1px solid rgba(244,63,94,0.35)",borderRadius:8,color:RED,
                                    padding:"6px 12px",cursor:"pointer",fontSize:11}}>삭제</button>
                              </div>
                            )}
                          </div>
                          {isEdit&&(
                            <div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:6}}>
                              <button onClick={function(){saveEditLog(l);}}
                                style={{background:ACC,border:"none",borderRadius:8,color:"#fff",
                                  padding:"6px 12px",cursor:"pointer",fontSize:11,fontWeight:700}}>저장</button>
                              <button onClick={function(){setEditLog(null);}}
                                style={{background:"transparent",border:"1px solid "+BRD,borderRadius:8,color:MUT,
                                  padding:"6px 12px",cursor:"pointer",fontSize:11}}>취소</button>
                            </div>
                          )}
                          {isDel&&(
                            <div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:6,alignItems:"center"}}>
                              <span style={{fontSize:11,color:RED}}>삭제할까요?</span>
                              <button onClick={function(){deleteLog(l);}}
                                style={{background:"rgba(244,63,94,0.15)",border:"1px solid rgba(244,63,94,0.4)",borderRadius:8,color:RED,
                                  padding:"6px 12px",cursor:"pointer",fontSize:11,fontWeight:700}}>확인</button>
                              <button onClick={function(){setDelLogId(null);}}
                                style={{background:"transparent",border:"1px solid "+BRD,borderRadius:8,color:MUT,
                                  padding:"6px 12px",cursor:"pointer",fontSize:11}}>취소</button>
                            </div>
                          )}
                        </div>
                      );
                    });
                  })()}
                </div>
                </Card>
              </div>
            );
          });
        })()
      )}
    </div>
  );
}

function Inventory({items,setItems,showToast,isAdmin,logs,initialGroup}){
  const [ag,setAg]=useState(initialGroup||"전체");
  useEffect(function(){setAg(initialGroup||"전체");},[initialGroup]);
  const [search,setSearch]=useState("");
  const [fDate,setFDate]=useState("");
  const [editId,setEditId]=useState(null);
  const [editVal,setEditVal]=useState("");
  const [detail,setDetail]=useState(null);
  function saveEdit(id){
    const v=parseInt(editVal);
    if(isNaN(v)||v<0){showToast("올바른 수량 입력",RED);return;}
    setItems(function(p){return p.map(function(i){return i.id===id?Object.assign({},i,{stock:v}):i;});});
    showToast("재고 수량 수정 완료");setEditId(null);
    apiPost("updateItem",{id:id,data:{"재고량":v}}).catch(function(){showToast("서버 저장 실패",YLW);});
  }
  const dateLogs=fDate?logs.filter(function(l){return l.date===fDate;}):[];
  const dateItemIds=fDate?new Set(dateLogs.map(function(l){return l.itemId;})):null;
  const list=items.filter(function(i){
    if(ag!=="전체"&&i.group!==ag)return false;
    if(search&&!i.name.includes(search)&&!i.id.includes(search))return false;
    if(fDate&&!dateItemIds.has(i.id))return false;
    return true;
  });
  const availDates=Array.from(new Set(logs.map(function(l){return l.date;}))).sort().reverse();
  return(
    <div>
      <SectionTitle title="재고 현황"sub={(list.length)+"종 표시"}
        right={!isAdmin?<span style={{fontSize:12,color:YLW,background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:8,padding:"6px 12px",fontWeight:600}}> 조회전용</span>:null}/>
      <GroupTabs active={ag} onChange={setAg}/>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:13,alignItems:"center"}}>
        <input type="date" value={fDate} onChange={function(e){setFDate(e.target.value);}}
          style={{background:SURF,border:"1px solid "+(fDate?ACC:BRD),borderRadius:8,
            color:fDate?ACCL:TXT,padding:"8px 14px",fontSize:14,colorScheme:"dark"}}/>
        {fDate&&<button onClick={function(){setFDate("");}}
          style={{background:"transparent",border:"1px solid "+BRD,borderRadius:8,color:MUT,
            padding:"8px 14px",cursor:"pointer",fontSize:12}}>날짜 초기화</button>}
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="품목 검색"
          style={{marginLeft:"auto",background:SURF,border:"1px solid "+BRD,borderRadius:8,color:TXT,padding:"8px 14px",fontSize:14,width:"100%",maxWidth:260}}/>
      </div>
      {fDate&&(
        <div style={{marginBottom:13,fontSize:12,color:MUT}}>
          {dateLogs.length>0?(fDate+" 입출고: "+list.length+"종 품목"):(fDate+"에 입출고 이력이 없습니다")}
        </div>
      )}
      {list.length===0&&(
        <Card style={{padding:"30px",textAlign:"center",color:MUT,fontSize:14}}>
          {fDate?(fDate+"에 입출고된 품목이 없습니다"):"해당하는 품목이 없습니다"}
        </Card>
      )}
      {(ag==="전체"?GROUPS:[ag]).map(function(g){
        const gi=list.filter(function(i){return i.group===g;});
        if(!gi.length)return null;
        return(
          <div key={g} style={{marginBottom:22}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:11,
              padding:"10px 14px",background:GCOL[g]+"0A",border:"1px solid "+GCOL[g]+"30",borderRadius:12}}>
              <div style={{width:34,height:34,borderRadius:8,background:GGRAD[g],
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:400,whiteSpace:"nowrap",flexShrink:0}}>{GICO[g]}</div>
              <div style={{flex:1}}>
                <span style={{fontWeight:800,fontSize:14,color:GCOL[g]}}>{g}</span>
                <span style={{fontSize:12,color:MUT,marginLeft:7}}>{GDSC[g]}</span>
              </div>
              <span style={{fontSize:12,color:MUT,flexShrink:0}}>{gi.length}종 - <span style={{color:GCOL[g],fontWeight:700}}>{comma(gi.reduce(function(s,i){return s+i.stock;},0))}kg</span></span>
            </div>
            <div style={{display:"grid",gap:9}}>
              {gi.map(function(item){
                const isEmpty=item.stock===0;
                return(
                  <Card key={item.id}
                    onClick={function(){if(editId!==item.id)setDetail(item);}}
                    style={{padding:"12px 16px",borderColor:isEmpty?"rgba(244,63,94,0.3)":BRD,
                      cursor:"pointer",transition:"all 0.15s"}}
                    onMouseOver={function(e){e.currentTarget.style.transform="translateY(-2px)";}}
